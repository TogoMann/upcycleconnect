services:
  postgres:
    image: postgres:18.3-alpine
    container_name: uc-db-prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uc-backend

  api:
    image: jensentuang/upcycleconnect-api:latest
    container_name: uc-api-prod
    restart: always
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    networks:
      - uc-backend
      - uc-api

  frontend:
    image: jensentuang/upcycleconnect-frontend:latest
    container_name: uc-front-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - uc-api

volumes:
  postgres_data:

networks:
  uc-backend:
  uc-api:
