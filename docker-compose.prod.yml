services:
  postgres:
    image: postgres:15.18-alpine
    container_name: uc-db-prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/seeds/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/seeds/02_prod_init.sql:/docker-entrypoint-initdb.d/02_prod_init.sql:ro
    networks:
      - uc-backend

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jensentuang/upcycleconnect-api:latest
    container_name: uc-api-prod
    restart: always
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FROM_EMAIL=${FROM_EMAIL}
      - APP_PORT=8081
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    networks:
      - uc-backend
      - uc-api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: jensentuang/upcycleconnect-frontend:latest
    container_name: uc-front-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - uc-api

  ml-training:
    build:
      context: ./scripts/ml
      dockerfile: Dockerfile
    container_name: uc-ml-prod
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - PYTHONUNBUFFERED=1
    depends_on:
      - postgres
    networks:
      - uc-backend

volumes:
  postgres_data:

networks:
  uc-backend:
  uc-api:
